<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5500;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="40" stroke="url(#grad)" stroke-width="6" fill="none" />
  <!-- Compass Needle (North) -->
  <polygon points="50,18 62,50 50,42" fill="url(#grad)" />
  <!-- Compass Needle (South) -->
  <polygon points="50,82 38,50 50,58" fill="#e0e0e0" />
  <!-- Center Point -->
  <circle cx="50" cy="50" r="4" fill="#ffffff" />
</svg>
